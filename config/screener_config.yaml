filters:
  roe_min: return_on_equity_pct
  de_max: debt_to_equity
  fcf_min: free_cash_flow_cr
  revenue_cagr_3yr_min: revenue_cagr_3yr
  revenue_cagr_5yr_min: revenue_cagr_5yr
  pat_cagr_5yr_min: pat_cagr_5yr
  opm_min: operating_profit_margin_pct
  pe_max: pe_ratio
  pb_max: pb_ratio
  dividend_yield_min: dividend_yield_pct
  dividend_payout_max: dividend_payout_ratio_pct
  icr_min: interest_coverage
  market_cap_min: market_cap_crore
  net_profit_min: net_profit
  eps_cagr_min: eps_cagr_5yr
  asset_turnover_min: asset_turnover
  sales_min: sales
  de_declining: de_declining_flag

presets:
  quality_compounder:
    roe_min: 15
    de_max: 1.0
    fcf_min: 0
    revenue_cagr_5yr_min: 10
    filter_scope: all_years
    max_results: 50

  value_pick:
    pe_max: 20
    pb_max: 3.0
    de_max: 2.0
    dividend_yield_min: 1
    filter_scope: all_years
    max_results: 50

  growth_accelerator:
    pat_cagr_5yr_min: 20
    revenue_cagr_5yr_min: 15
    de_max: 2.0
    filter_scope: all_years
    max_results: 50

  dividend_champion:
    dividend_yield_min: 2
    dividend_payout_max: 80
    fcf_min: 0
    filter_scope: all_years
    max_results: 50

  debt_free_blue_chip:
    debt_equal_zero: true
    roe_min: 12
    sales_min: 5000
    filter_scope: all_years
    max_results: 50

  turnaround_watch:
    revenue_cagr_3yr_min: 10
    fcf_min: 0
    de_declining: true
    filter_scope: all_years
    max_results: 50
